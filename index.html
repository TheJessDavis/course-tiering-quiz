<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Tiering Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e2e0d8;
      padding: 2.5rem;
      max-width: 680px;
      width: 100%;
    }

    /* ── Header ── */
    .quiz-header { margin-bottom: 2rem; }
    .quiz-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .quiz-header p  { font-size: 14px; color: #6b6a66; line-height: 1.5; }

    /* ── Progress ── */
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: #9b9a96;
    }
    .progress-track {
      height: 5px;
      background: #ede9e0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 2rem;
    }
    .progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 3px;
      transition: width 0.35s ease;
    }

    /* ── Question ── */
    .question-text {
      font-size: 18px;
      font-weight: 500;
      line-height: 1.45;
      margin-bottom: 6px;
    }
    .question-context {
      font-size: 13px;
      color: #6b6a66;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* ── Options ── */
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }

    .option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 1rem 1.125rem;
      background: #fafaf8;
      border: 1px solid #e2e0d8;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .option:hover { border-color: #a0a0a0; background: #f5f4f0; }
    .option.selected {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .option-label {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .option.selected .option-label { color: #1d4ed8; }

    .score-pill {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #e2e0d8;
      color: #6b6a66;
    }
    .option.selected .score-pill { background: #dbeafe; color: #1d4ed8; }

    .option-sub { font-size: 13px; color: #6b6a66; line-height: 1.5; }
    .option.selected .option-sub { color: #3b82f6; }

    /* ── Navigation ── */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1.5rem;
      border-top: 1px solid #ede9e0;
    }

    .btn {
      padding: 0.5rem 1.25rem;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #d1cfc6;
      background: transparent;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #f5f4f0; }
    .btn:disabled { opacity: 0.3; cursor: default; }

    .btn-primary {
      border-color: #2563eb;
      color: #2563eb;
    }
    .btn-primary:hover { background: #eff6ff; }
    .btn-primary:disabled { opacity: 0.3; cursor: default; }

    /* ── Results ── */
    .result-wrap { display: none; }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .tier-1-badge { background: #dcfce7; color: #15803d; }
    .tier-2-badge { background: #fef9c3; color: #a16207; }
    .tier-3-badge { background: #fee2e2; color: #b91c1c; }

    .result-title { font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
    .result-subtitle { font-size: 14px; color: #6b6a66; margin-bottom: 1.75rem; line-height: 1.6; }

    /* Score meter */
    .score-section { margin-bottom: 2rem; }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .score-row span:first-child { font-size: 13px; color: #6b6a66; }
    .score-row span:last-child  { font-size: 13px; font-weight: 600; }
    .score-track-result {
      height: 10px;
      background: #ede9e0;
      border-radius: 5px;
      overflow: hidden;
    }
    .score-fill-result {
      height: 100%;
      border-radius: 5px;
      transition: width 0.6s ease;
    }
    .zone-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #9b9a96;
      margin-top: 4px;
    }

    /* Measurement levels */
    .levels-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9b9a96;
      margin-bottom: 1rem;
    }

    .level-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-top: 1px solid #ede9e0;
    }
    .level-tag {
      font-size: 11px;
      font-weight: 700;
      color: #9b9a96;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 68px;
    }
    .level-content { flex: 1; }
    .level-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .level-desc { font-size: 13px; color: #6b6a66; line-height: 1.6; margin-bottom: 8px; }
    .level-howto {
      font-size: 12px;
      background: #f5f4f0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #4b4b48;
      line-height: 1.6;
    }
    .level-howto strong { font-weight: 600; color: #1a1a18; }

    /* Score breakdown */
    .breakdown {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #ede9e0;
    }
    .breakdown-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #9b9a96;
      margin-bottom: 1rem;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 13px;
    }
    .breakdown-q { color: #4b4b48; flex: 1; padding-right: 1rem; }
    .breakdown-a { color: #6b6a66; font-style: italic; flex: 1; padding-right: 1rem; }
    .breakdown-score { font-weight: 600; min-width: 24px; text-align: right; }
    .score-low  { color: #15803d; }
    .score-mid  { color: #a16207; }
    .score-high { color: #b91c1c; }

    .actions { display: flex; gap: 10px; margin-top: 2rem; flex-wrap: wrap; }
    .btn-restart { font-size: 14px; }
  </style>
</head>
<body>

<div class="card">

  <!-- ── QUIZ ── -->
  <div id="quiz">
    <div class="quiz-header">
      <h1>Course Tiering Quiz</h1>
      <p>Answer 6 questions to find out how much measurement this course warrants, from a basic knowledge check all the way to tracking whether behavior changed on the job and whether a business metric moved.</p>
    </div>

    <div class="progress-meta">
      <span id="q-num">Question 1 of 7</span>
      <span id="q-pct">14%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress" style="width: 14%"></div>
    </div>

    <div class="question-text" id="q-text"></div>
    <div class="question-context" id="q-context"></div>
    <div class="options" id="options"></div>

    <div class="nav">
      <button class="btn" id="back-btn" onclick="goBack()" disabled>Back</button>
      <button class="btn btn-primary" id="next-btn" onclick="goNext()" disabled>Next</button>
    </div>
  </div>

  <!-- ── RESULTS ── -->
  <div id="result" class="result-wrap"></div>

</div>

<script>
  const questions = [
    {
      text: "What's the realistic cost if a learner gets this wrong on the job?",
      context: "Think about what happens downstream when someone misapplies or forgets this content.",
      options: [
        {
          label: "No direct consequence",
          sub: "Awareness or background content. Errors would be minor, self-correcting, or invisible in day-to-day work.",
          score: 1
        },
        {
          label: "Rework, delays, or process friction",
          sub: "Mistakes create extra steps or corrections, but nothing that puts revenue, compliance, or patient accounts at serious risk.",
          score: 2
        },
        {
          label: "Revenue impact, claim errors, or compliance risk",
          sub: "Getting this wrong directly affects billing, denial rates, payer relationships, patient accounts, or creates regulatory or audit exposure.",
          score: 3
        },
        {
          label: "Significant financial liability, patient harm risk, or regulatory penalty",
          sub: "Errors in this area could trigger audits, corrective action plans, payer recoupments, or create patient safety concerns. Leadership would be notified.",
          score: 4
        }
      ]
    },
    {
      text: "Is there a specific, observable job behavior this course is supposed to change or support?",
      context: "The key question: can you describe what a learner should DO differently after this course, not just what they should know?",
      options: [
        {
          label: "No: it's background knowledge",
          sub: "The stakeholder's answer was \"they should just know this.\" No clear task or behavior is attached. There's no obvious performance gap driving it.",
          score: 1
        },
        {
          label: "Sort of: behaviors exist but are hard to isolate",
          sub: "There are job tasks loosely connected to this content, but they're mixed in with other skills, hard to observe, or only come up in rare or unusual situations.",
          score: 2
        },
        {
          label: "Yes: clear, observable job tasks",
          sub: "You can name the exact steps a learner should do differently. A manager could watch someone do those tasks and evaluate whether training did its job.",
          score: 3
        },
        {
          label: "Yes, and performance in this area is already being formally tracked or audited",
          sub: "There's an existing quality review, audit process, or performance standard against which this behavior is already being measured. Training should move that number.",
          score: 4
        }
      ]
    },
    {
      text: "How often will learners apply this content on the job?",
      context: "Frequency matters for measurement. Low-frequency content is hard to evaluate through behavior because there's not enough opportunity to observe it.",
      options: [
        {
          label: "Rarely or situationally",
          sub: "Edge cases, annual scenarios, or reference material they might look up occasionally. Most learners will go months without using it.",
          score: 1
        },
        {
          label: "Monthly or occasionally",
          sub: "They'll use it regularly but not every day. Examples: quarterly processes, payer-specific rules, or content tied to certain claim types.",
          score: 2
        },
        {
          label: "Daily or weekly: this is core work",
          sub: "This is central to how they do their job. Errors or gaps here would show up quickly in their day-to-day performance.",
          score: 3
        },
        {
          label: "Multiple times per day: this is a repeating core task",
          sub: "This content covers something learners do constantly. Any gap in performance would be immediately visible in output volume, error queues, or supervisor feedback.",
          score: 4
        }
      ]
    },
    {
      text: "Is there a regulatory, compliance, or accreditation requirement tied to this content?",
      context: "Content with external accountability warrants rigorous documentation that training was effective.",
      options: [
        {
          label: "No external requirement",
          sub: "This course exists to improve performance or fill a knowledge gap, but no external body is expecting proof of training effectiveness.",
          score: 1
        },
        {
          label: "Loosely related to a compliance area",
          sub: "The content supports compliance generally (billing integrity, HIPAA awareness) but it's not directly mandated or audited.",
          score: 2
        },
        {
          label: "Directly required: audit or accreditation risk if untrained",
          sub: "Regulators, payers, or accrediting bodies could ask for evidence that staff are trained AND performing correctly in this area.",
          score: 3
        },
        {
          label: "Actively audited: we have been cited or flagged in this area before",
          sub: "This content area has generated a findings letter, corrective action plan, payer audit, or compliance flag. There is documented organizational risk.",
          score: 4
        }
      ]
    },
    {
      text: "Is there a business metric you could realistically tie to this training?",
      context: "This doesn't have to be perfect. You're looking for a metric that would move if the training worked and move in the wrong direction if it didn't.",
      options: [
        {
          label: "No obvious metric exists",
          sub: "The content is too general, the audience too small, or the job task too complex to isolate. No number would meaningfully change based on this course alone.",
          score: 1
        },
        {
          label: "Maybe: a metric exists but isolating the impact would be difficult",
          sub: "There's a relevant KPI (denial rates, error rates, etc.) but many factors drive it. Training's contribution would be hard to separate from everything else.",
          score: 2
        },
        {
          label: "Yes: there's a direct, trackable metric",
          sub: "You can name it: first-pass resolution rate, denial rate for a specific code type, rework volume, claim processing time. Before/after comparison is feasible.",
          score: 3
        },
        {
          label: "Yes, and leadership already monitors this metric regularly",
          sub: "This KPI appears in dashboards, team reviews, or reports that senior leadership already monitors. Training impact would be immediately visible.",
          score: 4
        }
      ]
    },
    {
      text: "Is a manager or supervisor actively involved in reinforcing what learners take from this course?",
      context: "Level 3 measurement (behavior change) requires a feedback loop between training and the work environment. Without manager involvement, behavior change is hard to verify and hard to sustain.",
      options: [
        {
          label: "No: learners are on their own after the course",
          sub: "There's no expectation that managers will observe, coach, or follow up on this content. Learning stops at the LMS completion mark.",
          score: 1
        },
        {
          label: "Managers are aware but not actively reinforcing",
          sub: "They know training happened, but there's no structured coaching, observation, or follow-up built into the workflow.",
          score: 2
        },
        {
          label: "Managers actively coach or observe this behavior",
          sub: "There's a real feedback loop: managers can evaluate whether this is showing up in work, provide coaching when it's not, and are bought in to the training's purpose.",
          score: 3
        },
        {
          label: "Structured manager observation and documentation is already in place",
          sub: "Managers have observation checklists, quality review processes, or structured coaching cycles tied to this skill area. Training plugs directly into an existing performance framework.",
          score: 4
        }
      ]
    }
  ];

  let current  = 0;
  let answers  = new Array(questions.length).fill(null);

  function render() {
    const q = questions[current];
    const pct = Math.round(((current + 1) / questions.length) * 100);

    document.getElementById('q-num').textContent  = `Question ${current + 1} of ${questions.length}`;
    document.getElementById('q-pct').textContent  = `${pct}%`;
    document.getElementById('progress').style.width = `${pct}%`;
    document.getElementById('q-text').textContent    = q.text;
    document.getElementById('q-context').textContent = q.context;

    const opts = document.getElementById('options');
    opts.innerHTML = '';

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option' + (answers[current] === i ? ' selected' : '');
      btn.innerHTML = `
        <div class="option-label">
          ${opt.label}
          <span class="score-pill">${['Low', 'Moderate', 'High', 'Critical'][i]} · ${opt.score} pt${opt.score > 1 ? 's' : ''}</span>
        </div>
        <div class="option-sub">${opt.sub}</div>
      `;
      btn.addEventListener('click', () => selectOption(i));
      opts.appendChild(btn);
    });

    document.getElementById('back-btn').disabled = current === 0;
    document.getElementById('next-btn').disabled = answers[current] === null;
    document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'See results →' : 'Next';
  }

  function selectOption(i) {
    answers[current] = i;
    document.querySelectorAll('.option').forEach((b, idx) => {
      b.className = 'option' + (idx === i ? ' selected' : '');
    });
    document.getElementById('next-btn').disabled = false;
  }

  function goNext() {
    if (current < questions.length - 1) { current++; render(); }
    else showResult();
  }

  function goBack() {
    if (current > 0) { current--; render(); }
  }

  function showResult() {
    const total = answers.reduce((sum, a, i) => sum + (a !== null ? questions[i].options[a].score : 0), 0);
    const max   = questions.length * 4;  // 24
    const pct   = Math.round((total / max) * 100);

    // ── Tier config ──
    const tiers = {
      1: {
        badgeClass: 'tier-1-badge',
        label:      'Tier 1: Foundational',
        title:      'Foundational / informational course',
        subtitle:   'This course is awareness-level content with limited direct performance impact. A reaction survey and a knowledge check are sufficient. Adding more won\'t generate useful data and will waste learner and admin time.',
        scoreColor: '#16a34a',
        levels: [
          {
            tag:  'Level 1',
            name: 'Reaction survey',
            desc: 'Did learners find the content relevant, clear, and useful? The goal is not to measure enjoyment but whether it felt applicable to their work.',
            howto: '<strong>How to build it:</strong> 3–5 questions max. Likert scale (1–5) for relevance, clarity, and usefulness. One open-field question: "What would make this course more useful?" Deliver via LMS on course exit or auto-trigger a Microsoft Form on completion. Keep it under 2 minutes.'
          },
          {
            tag:  'Level 2',
            name: 'Knowledge check',
            desc: 'Did learners retain the core concepts? This is not a trivia quiz. Questions should reflect real judgment calls or scenarios a learner would face on the job.',
            howto: '<strong>How to build it:</strong> 5–10 scenario-based questions. Avoid recall questions like "What does COBRA stand for?" and use applied questions like "A patient lost job-based coverage 45 days ago. Which coverage type applies?" Build directly into the course, not as a separate survey. Require a passing score if the content is important enough to measure.'
          }
        ]
      },
      2: {
        badgeClass: 'tier-2-badge',
        label:      'Tier 2: Process-based',
        title:      'Process-based / applied course',
        subtitle:   'This course supports real job tasks with moderate stakes. A knowledge check alone is not enough. You need to know if behavior changed after learners left the course. A 30-day follow-up is the key differentiator at this tier. Most revenue cycle courses should land here.',
        scoreColor: '#d97706',
        levels: [
          {
            tag:  'Level 1',
            name: 'Reaction survey',
            desc: 'Covers relevance, clarity, and perceived applicability. At this tier, also ask whether the course reflected how work is done on the job, not just textbook process.',
            howto: '<strong>How to build it:</strong> 4–5 questions. Add one question specific to process applicability: "How closely did this course reflect the real process you use on the job?" (1–5 scale). One open field for suggestions. Auto-trigger on course completion.'
          },
          {
            tag:  'Level 2',
            name: 'Pre/post knowledge check',
            desc: 'At this tier, use a pre-assessment before the course begins and the same (or parallel) assessment after. This shows real knowledge gain, not just whether someone could guess correctly.',
            howto: '<strong>How to build it:</strong> 8–12 scenario-based questions. Use the same question set (or a parallel form) pre and post. The gap between scores is your Level 2 measurement. Store both scores in the LMS or export to Excel for comparison. Flag learners who score below threshold post-course for follow-up.'
          },
          {
            tag:  'Level 3',
            name: '30-day behavior follow-up',
            desc: 'This is the measurement most courses skip, and the one that tells you whether the training had any impact. At 30 days, you\'re asking: did behavior change on the job?',
            howto: '<strong>How to build it:</strong> Send a short Microsoft Form automatically 30 days after LMS completion. 4–5 questions: "How often have you applied what you learned?" / "What, if anything, is preventing you from applying it?" / "What would have made the training more useful for your day-to-day work?" Optional: send a parallel 2-question version to the learner\'s manager asking whether they\'ve observed the target behavior.'
          }
        ]
      },
      3: {
        badgeClass: 'tier-3-badge',
        label:      'Tier 3: High-stakes',
        title:      'High-stakes / strategic course',
        subtitle:   'This course has real business impact. Errors here cost money, create compliance risk, or directly affect patient account outcomes. All four Kirkpatrick levels apply. Manager involvement at Level 3 is not optional. This tier requires the most infrastructure but produces data you can put in front of senior leadership as evidence that training is working.',
        scoreColor: '#dc2626',
        levels: [
          {
            tag:  'Level 1',
            name: 'Reaction survey',
            desc: 'Same as lower tiers, but at this tier also ask specifically whether the course reflected the real complexity of the work, not a simplified version of it.',
            howto: '<strong>How to build it:</strong> 5 questions. Add: "Did this course reflect the real complexity and unusual situations you encounter on the job?" (1–5) and "What scenario or situation would you add to make this more realistic?" Auto-trigger on course completion.'
          },
          {
            tag:  'Level 2',
            name: 'Pre/post knowledge check with performance threshold',
            desc: 'At this tier, the post-assessment has consequences. Learners who fall below the threshold should be flagged for follow-up or re-training, not just allowed to proceed.',
            howto: '<strong>How to build it:</strong> 10–15 scenario-based questions. Set a minimum passing threshold (e.g., 80%). Learners below threshold get auto-enrolled in a follow-up session or are flagged for manager coaching. Export pre/post scores to track knowledge gain over time. Consider branching: learners who score very high on the pre-assessment get an advanced path.'
          },
          {
            tag:  'Level 3',
            name: '30/60/90-day behavior follow-up with manager loop',
            desc: 'Behavior change takes time and reinforcement. At 30 days you\'re looking for initial application. At 60 days you\'re checking for sustainability. At 90 days you\'re confirming it\'s embedded.',
            howto: '<strong>How to build it:</strong> Three automated Microsoft Forms sent at 30, 60, and 90 days post-completion. Learner form: "How often are you applying this?" / "What\'s getting in the way?" / "What questions have come up that the training didn\'t answer?" Manager form (2 questions, same intervals): "Have you observed [target behavior] in this team member\'s work?" / "Has any coaching or correction been needed in this area?" Aggregate responses in a shared Excel or Power BI to spot patterns.'
          },
          {
            tag:  'Level 4',
            name: 'Business results: before and after metric tracking',
            desc: 'This is where you connect training to the number that matters. Identify the metric before the course launches, capture a baseline, then track it at 60 and 90 days post-training.',
            howto: '<strong>How to build it:</strong> Pick one primary metric before launch: denial rate for the relevant code type, first-pass resolution rate, rework volume, error count per 100 claims, whatever operations already tracks. Pull a 90-day baseline. Run the training. Pull the same metric at 60 and 90 days post-training. Compare. Build a simple before/after chart in Power BI. Present it to senior leadership as evidence of impact, not just completion numbers.'
          }
        ]
      }
    };

    let tierKey;
    if (total <= 11) tierKey = 1;
    else if (total <= 17) tierKey = 2;
    else tierKey = 3;

    const t = tiers[tierKey];

    // Build score breakdown table
    const breakdownRows = answers.map((a, i) => {
      if (a === null) return '';
      const score = questions[i].options[a].score;
      const cls   = score === 1 ? 'score-low' : score <= 3 ? 'score-mid' : 'score-high';
      const shortQ = questions[i].text.replace(/\?$/, '').substring(0, 55) + (questions[i].text.length > 55 ? '...' : '?');
      const shortA = questions[i].options[a].label;
      return `
        <div class="breakdown-row">
          <div class="breakdown-q">${shortQ}</div>
          <div class="breakdown-a">${shortA}</div>
          <div class="breakdown-score ${cls}">${score}</div>
        </div>
      `;
    }).join('');

    document.getElementById('quiz').style.display = 'none';

    const r = document.getElementById('result');
    r.style.display = 'block';
    r.innerHTML = `
      <div class="quiz-header">
        <h1>Course Tiering Result</h1>
      </div>

      <span class="tier-badge ${t.badgeClass}">${t.label}</span>
      <div class="result-title">${t.title}</div>
      <div class="result-subtitle">${t.subtitle}</div>

      <div class="score-section">
        <div class="score-row">
          <span>Total score</span>
          <span>${total} / ${max} points (${pct}%)</span>
        </div>
        <div class="score-track-result">
          <div class="score-fill-result" style="width: ${pct}%; background: ${t.scoreColor};"></div>
        </div>
        <div class="zone-labels">
          <span>Tier 1 (6–11)</span>
          <span>Tier 2 (12–17)</span>
          <span>Tier 3 (18–24)</span>
        </div>
      </div>

      <div class="levels-heading">Measurement levels to implement</div>

      ${t.levels.map(l => `
        <div class="level-item">
          <div class="level-tag">${l.tag}</div>
          <div class="level-content">
            <div class="level-name">${l.name}</div>
            <div class="level-desc">${l.desc}</div>
            <div class="level-howto">${l.howto}</div>
          </div>
        </div>
      `).join('')}

      <div class="breakdown">
        <div class="breakdown-heading">Score breakdown</div>
        <div class="breakdown-row" style="font-size: 11px; font-weight: 700; color: #9b9a96; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 8px;">
          <div class="breakdown-q">Question</div>
          <div class="breakdown-a">Your answer</div>
          <div class="breakdown-score">Pts</div>
        </div>
        ${breakdownRows}
        <div class="breakdown-row" style="border-top: 1px solid #e2e0d8; margin-top: 8px; padding-top: 12px; font-weight: 600;">
          <div class="breakdown-q">Total</div>
          <div class="breakdown-a"></div>
          <div class="breakdown-score">${total}</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-restart" onclick="restartQuiz()">← Start over with a different course</button>
      </div>
    `;
  }

  function restartQuiz() {
    current = 0;
    answers = new Array(questions.length).fill(null);
    document.getElementById('result').style.display  = 'none';
    document.getElementById('result').innerHTML      = '';
    document.getElementById('quiz').style.display    = 'block';
    render();
  }

  render();
</script>
</body>
</html>
